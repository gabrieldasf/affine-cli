            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                mutation abortBlobUpload(
                  $workspaceId: String!
                  $key: String!
                  $uploadId: String!
                ) {
                  abortBlobUpload(workspaceId: $workspaceId, key: $key, uploadId: $uploadId)
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: abortBlobUploadResponse

      complete-blob-upload:
        method: POST
        path: /graphql
        description: Run AFFiNE mutation completeBlobUpload.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "completeBlobUpload"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                mutation completeBlobUpload(
                  $workspaceId: String!
                  $key: String!
                  $uploadId: String
                  $parts: [BlobUploadPartInput!]
                ) {
                  completeBlobUpload(
                    workspaceId: $workspaceId
                    key: $key
                    uploadId: $uploadId
                    parts: $parts
                  )
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: completeBlobUploadResponse

      create-blob-upload:
        method: POST
        path: /graphql
        description: Run AFFiNE mutation createBlobUpload.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "createBlobUpload"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                mutation createBlobUpload(
                  $workspaceId: String!
                  $key: String!
                  $size: Int!
                  $mime: String!
                ) {
                  createBlobUpload(
                    workspaceId: $workspaceId
                    key: $key
                    size: $size
                    mime: $mime
                  ) {
                    method
                    blobKey
                    alreadyUploaded
                    uploadUrl
                    headers
                    expiresAt
                    uploadId
                    partSize
                    uploadedParts {
                      partNumber
                      etag
                    }
                  }
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: createBlobUploadResponse

      delete-blob:
