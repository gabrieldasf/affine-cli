name: affine
display_name: AFFiNE
description: AFFiNE self-hosted GraphQL API wrapper generated from qtz-affine schema.gql and client .gql documents.
cli_description: Operate AFFiNE GraphQL from the terminal.
version: "0.1.0"
spec_source: official
category: productivity
website_url: "https://affine.quartzo.ai"
base_url: "https://qtz-affine.fly.dev"
graphql_endpoint_path: "/graphql"

auth:
  type: bearer_token
  header: Authorization
  in: header
  env_vars:
    - AFFINE_TOKEN
  verify_query: "{ currentUser { id email name } }"

config:
  format: toml
  path: "~/.config/affine-cli-v2/config.toml"

resources:
  graphql:
    description: Raw AFFiNE GraphQL operations.
    endpoints:
      execute:
        method: POST
        path: /graphql
        description: Execute any AFFiNE GraphQL document.
        body:
          - name: operationName
            type: string
            description: "Optional GraphQL operation name."
          - name: query
            type: string
            required: true
            description: "GraphQL query or mutation document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: GraphQLResponse

  admins:
    description: AFFiNE admins GraphQL operations.
    endpoints:
      admin-all-shared-links:
        method: POST
        path: /graphql
        description: Run AFFiNE query adminAllSharedLinks.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminAllSharedLinks"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                query adminAllSharedLinks(
                  $pagination: PaginationInput!
                  $filter: AdminAllSharedLinksFilterInput
                ) {
                  adminAllSharedLinks(pagination: $pagination, filter: $filter) {
                    totalCount
                    analyticsWindow {
                      from
                      to
                      timezone
                      bucket
                      requestedSize
                      effectiveSize
                    }
                    pageInfo {
                      hasNextPage
                      hasPreviousPage
                      startCursor
                      endCursor
                    }
                    edges {
                      cursor
                      node {
                        workspaceId
                        docId
                        title
                        publishedAt
                        docUpdatedAt
                        workspaceOwnerId
                        lastUpdaterId
                        shareUrl
                        views
                        uniqueViews
                        guestViews
                        lastAccessedAt
                      }
                    }
                  }
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminAllSharedLinksResponse

      admin-dashboard:
        method: POST
        path: /graphql
        description: Run AFFiNE query adminDashboard.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminDashboard"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                query adminDashboard($input: AdminDashboardInput) {
                  adminDashboard(input: $input) {
                    syncActiveUsers
                    syncActiveUsersTimeline {
                      minute
                      activeUsers
                    }
                    syncWindow {
                      from
                      to
                      timezone
                      bucket
                      requestedSize
                      effectiveSize
                    }
                    copilotConversations
                    workspaceStorageBytes
                    blobStorageBytes
                    workspaceStorageHistory {
                      date
                      value
                    }
                    blobStorageHistory {
                      date
                      value
                    }
                    storageWindow {
                      from
                      to
                      timezone
                      bucket
                      requestedSize
                      effectiveSize
                    }
                    topSharedLinks {
                      workspaceId
                      docId
                      title
                      shareUrl
                      publishedAt
                      views
                      uniqueViews
                      guestViews
                      lastAccessedAt
                    }
                    topSharedLinksWindow {
                      from
                      to
                      timezone
                      bucket
                      requestedSize
                      effectiveSize
                    }
                    generatedAt
                  }
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminDashboardResponse

      admin-server-config:
        method: POST
        path: /graphql
        description: Run AFFiNE query adminServerConfig.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminServerConfig"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                query adminServerConfig {
                  serverConfig {
                    version
                    baseUrl
                    name
                    features
                    type
                    initialized
                    credentialsRequirement {
                      ...CredentialsRequirements
                    }
                    availableUpgrade {
                      changelog
                      version
                      publishedAt
                      url
                    }
                    availableUserFeatures
                    availableWorkspaceFeatures
                  }
                }
                
                fragment CredentialsRequirements on CredentialsRequirementType {
                  password {
                    ...PasswordLimits
                  }
                }
                
                fragment PasswordLimits on PasswordLimitsType {
                  minLength
                  maxLength
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminServerConfigResponse

      admin-update-workspace:
        method: POST
        path: /graphql
        description: Run AFFiNE mutation adminUpdateWorkspace.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminUpdateWorkspace"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                mutation adminUpdateWorkspace($input: AdminUpdateWorkspaceInput!) {
                  adminUpdateWorkspace(input: $input) {
                    id
                    public
                    createdAt
                    name
                    avatarKey
                    enableAi
                    enableSharing
                    enableUrlPreview
                    enableDocEmbedding
                    features
                    owner {
                      id
                      name
                      email
                      avatarUrl
                    }
                    memberCount
                    publicPageCount
                    snapshotCount
                    snapshotSize
                    blobCount
                    blobSize
                  }
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminUpdateWorkspaceResponse

      admin-workspace:
        method: POST
        path: /graphql
        description: Run AFFiNE query adminWorkspace.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminWorkspace"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                query adminWorkspace(
                  $id: String!
                  $memberSkip: Int
                  $memberTake: Int
                  $memberQuery: String
                ) {
                  adminWorkspace(id: $id) {
                    id
                    public
                    createdAt
                    name
                    avatarKey
                    enableAi
                    enableSharing
                    enableUrlPreview
                    enableDocEmbedding
                    features
                    owner {
                      id
                      name
                      email
                      avatarUrl
                    }
                    memberCount
                    publicPageCount
                    snapshotCount
                    snapshotSize
                    blobCount
                    blobSize
                    sharedLinks {
                      docId
                      title
                      publishedAt
                    }
                    members(skip: $memberSkip, take: $memberTake, query: $memberQuery) {
                      id
                      name
                      email
                      avatarUrl
                      role
                      status
                    }
                  }
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminWorkspaceResponse

      admin-workspaces:
        method: POST
        path: /graphql
        description: Run AFFiNE query adminWorkspaces.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminWorkspaces"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                query adminWorkspaces($filter: ListWorkspaceInput!) {
                  adminWorkspaces(filter: $filter) {
                    id
                    public
                    createdAt
                    name
                    avatarKey
                    enableAi
                    enableSharing
                    enableUrlPreview
                    enableDocEmbedding
                    features
                    owner {
                      id
                      name
                      email
                      avatarUrl
                    }
                    memberCount
                    publicPageCount
                    snapshotCount
                    snapshotSize
                    blobCount
                    blobSize
                  }
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminWorkspacesResponse

      admin-workspaces-count:
        method: POST
        path: /graphql
        description: Run AFFiNE query adminWorkspacesCount.
        body:
          - name: operationName
            type: string
            required: true
            default:
              "adminWorkspacesCount"
            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                query adminWorkspacesCount($filter: ListWorkspaceInput!) {
                  adminWorkspacesCount(filter: $filter)
                }
            description: "GraphQL query document."
          - name: variables
            type: object
            description: "GraphQL variables as JSON."
        response:
          type: object
          item: adminWorkspacesCountResponse

