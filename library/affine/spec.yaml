            description: "GraphQL operation name."
          - name: query
            type: string
            default:
              |-
                mutation deleteBlob(
                  $workspaceId: String!
                  $key: String!
                  $permanently: Boolean
                ) {
                  deleteBlob(workspaceId: $workspaceId, key: $key, permanently: $permanently)
                }
            description: "GraphQL query document."
          - name: variables
