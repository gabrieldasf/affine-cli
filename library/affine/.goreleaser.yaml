version: 2
project_name: affine-pp-cli
changelog:
  disable: true
builds:
  - id: affine-pp-cli
    main: ./cmd/affine-pp-cli
    binary: affine-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X affine-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: affine-pp-mcp
    main: ./cmd/affine-pp-mcp
    binary: affine-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: affine-pp-cli
    repository:
      owner: gabrieldasf
      name: homebrew-tap
    homepage: "https://github.com/gabrieldasf/affine-pp-cli"
    description: "Operate AFFiNE GraphQL from the terminal."
    install: |
      bin.install "affine-pp-cli"
      bin.install "affine-pp-mcp"
